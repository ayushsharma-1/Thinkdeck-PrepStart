version: '3.8'

services:
  # Node.js Backend Server
  backend-server:
    build: 
      context: ./backend-server
      dockerfile: Dockerfile
    container_name: prepstart-backend-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    env_file:
      - ./backend-server/.env
    volumes:
      - ./backend-server/logs:/app/logs
      - ./backend-server/.env:/app/.env:ro
    networks:
      - prepstart-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI Backend
  backend-fastapi:
    build:
      context: ./backend-fastapi  
      dockerfile: Dockerfile
    container_name: prepstart-backend-fastapi
    ports:
      - "8000:8000"
    environment:
      - PYTHON_ENV=production
    env_file:
      - ./backend-fastapi/.env
    volumes:
      - ./backend-fastapi/logs:/app/logs
      - ./backend-fastapi/.env:/app/.env:ro
    networks:
      - prepstart-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend (Optional - can run separately with npm run dev)
  frontend-client:
    build:
      context: ./frontend-client
      dockerfile: Dockerfile
    container_name: prepstart-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_FASTAPI_URL=http://localhost:8000
    volumes:
      - ./frontend-client/.env.local:/app/.env.local:ro
    networks:
      - prepstart-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  prepstart-network:
    driver: bridge

# Note: No volumes needed since we're using cloud services:
# - MongoDB Atlas (cloud)
# - Redis Cloud  
# - RabbitMQ Cloud
